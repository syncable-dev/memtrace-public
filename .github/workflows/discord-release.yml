name: Post release to Discord

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Post release embed to changelog
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_CHANGELOG_WEBHOOK }}
          nodetail: true
          username: "Memtrace Releases"
          avatar_url: "https://github.com/syncable-dev.png"
          title: "${{ github.event.repository.name }} ${{ github.event.release.tag_name }}"
          description: ${{ github.event.release.body }}
          url: ${{ github.event.release.html_url }}
          color: 0x00d4b8
